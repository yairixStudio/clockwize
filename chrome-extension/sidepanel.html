<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockwize</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Connection status screen -->
  <div id="status-screen" class="status-screen">
    <div class="status-content">
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="28" stroke="#6366f1" stroke-width="3" fill="none"/>
          <circle cx="32" cy="32" r="3" fill="#6366f1"/>
          <line x1="32" y1="32" x2="32" y2="16" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="32" y1="32" x2="44" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="32" cy="8" r="2" fill="#6366f1"/>
          <circle cx="56" cy="32" r="2" fill="#6366f1"/>
          <circle cx="32" cy="56" r="2" fill="#6366f1"/>
          <circle cx="8" cy="32" r="2" fill="#6366f1"/>
        </svg>
        <h1 class="logo-text">Clockwize</h1>
      </div>

      <div id="status-message" class="status-message">
        <div class="spinner"></div>
        <p>מתחבר ל-Clockwize...</p>
      </div>

      <div id="error-message" class="error-message" style="display: none;">
        <div class="error-icon">!</div>
        <p>Clockwize לא פעיל</p>
        <span class="error-hint">ודא שהאפליקציה רצה על המחשב</span>
        <button id="retry-btn" class="retry-btn">נסה שוב</button>
      </div>

      <div id="port-config" class="port-config">
        <label for="port-input">פורט:</label>
        <input type="number" id="port-input" value="5001" min="1000" max="65535">
        <button id="save-port-btn" class="save-port-btn">שמור</button>
      </div>
    </div>
  </div>

  <!-- Clockwize iframe -->
  <iframe id="clockwize-frame" class="clockwize-frame" style="display: none;"></iframe>

  <!-- Domain detection bar -->
  <div id="domain-bar" class="domain-bar" style="display: none;">
    <div class="domain-bar-content">
      <span id="domain-url" class="domain-url" dir="ltr"></span>
      <span id="domain-client" class="domain-client">לא ידוע</span>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
